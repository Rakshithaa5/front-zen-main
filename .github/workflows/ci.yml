name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run static analysis
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Verify backend sources parse
        run: find backend -name '*.js' -print0 | xargs -0 -n 1 node --check

      - name: Start backend API
        env:
          PORT: 5000
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm start --prefix backend > /tmp/backend.log 2>&1 & echo $! > /tmp/backend.pid

      - name: Wait for backend health check
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/api/health; then
              exit 0
            fi

            sleep 2
          done

          echo "Backend did not become healthy in time"
          cat /tmp/backend.log
          exit 1

      - name: Stop backend API
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

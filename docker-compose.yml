services:
  backend:
    image: rakshithaa5/front-zen-backend:latest
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: rakshithaa5/front-zen-frontend:latest
    build:
      context: .
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped